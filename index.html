<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AirKu POS - Depo Air Minum</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>* { -webkit-tap-highlight-color: transparent; } body { background: #f9fafb; }</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ============================================================
    // SUPABASE CONFIG
    // ============================================================
    const SUPABASE_URL = "https://tfgxupnchvaezomwlwln.supabase.co";
    const SUPABASE_KEY = "sb_publishable_nv0iL_lV1KxGWG13PKI31g_RiX8iiF4";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ============================================================
    // HELPERS
    // ============================================================
    const fmt = n => new Intl.NumberFormat("id-ID",{style:"currency",currency:"IDR",minimumFractionDigits:0}).format(n);
    const fmtDate = d => new Date(d).toLocaleDateString("id-ID",{day:"2-digit",month:"short",year:"numeric"});
    const today = () => new Date().toISOString().split("T")[0];
    const genId = p => `${p}${Date.now().toString().slice(-6)}`;

    // ============================================================
    // DB HELPERS
    // ============================================================
    async function loadAll() {
      const [{ data: appState }, { data: customers }, { data: transactions }] = await Promise.all([
        sb.from("app_state").select("*").eq("id", 1).single(),
        sb.from("customers").select("*").order("created_at"),
        sb.from("transactions").select("*").order("created_at"),
      ]);
      return {
        stock: appState?.stock ?? 48,
        cashBalance: appState?.cash_balance ?? 0,
        pricePerGallon: appState?.price_per_gallon ?? 15000,
        customers: (customers || []).map(dbToCustomer),
        transactions: (transactions || []).map(dbToTx),
      };
    }

    function dbToCustomer(c) {
      return {
        id: c.id, name: c.name, phone: c.phone, type: c.type,
        balance: c.balance || 0,
        gallon_taken: c.gallon_taken || 0,
        dueDate: c.due_date,
        overdue: c.overdue || false,
        gallonDeposit: c.gallon_deposit || 0,
        packageQuota: c.package_quota || 0,
        usedQuota: c.used_quota || 0,
        packagePaid: c.package_paid || 0,
        deferredRevenue: c.deferred_revenue || 0,
      };
    }

    function dbToTx(t) {
      return {
        id: t.id, date: t.date,
        customerId: t.customer_id,
        customerName: t.customer_name,
        type: t.type, qty: t.qty, amount: t.amount, note: t.note,
      };
    }

    async function updateAppState(patch) {
      await sb.from("app_state").update(patch).eq("id", 1);
    }

    async function upsertCustomer(c) {
      await sb.from("customers").upsert({
        id: c.id, name: c.name, phone: c.phone, type: c.type,
        balance: c.balance || 0,
        gallon_taken: c.gallon_taken || 0,
        due_date: c.dueDate || null,
        overdue: c.overdue || false,
        gallon_deposit: c.gallonDeposit || 0,
        package_quota: c.packageQuota || 0,
        used_quota: c.usedQuota || 0,
        package_paid: c.packagePaid || 0,
        deferred_revenue: c.deferredRevenue || 0,
      });
    }

    async function insertTx(t) {
      await sb.from("transactions").insert({
        id: t.id, date: t.date,
        customer_id: t.customerId || null,
        customer_name: t.customerName,
        type: t.type, qty: t.qty, amount: t.amount, note: t.note,
      });
    }

    // ============================================================
    // UI PRIMITIVES
    // ============================================================
    function Badge({color,children}) {
      const c={green:"bg-emerald-100 text-emerald-700 border-emerald-200",red:"bg-red-100 text-red-700 border-red-200",amber:"bg-amber-100 text-amber-700 border-amber-200",blue:"bg-blue-100 text-blue-700 border-blue-200",violet:"bg-violet-100 text-violet-700 border-violet-200",gray:"bg-gray-100 text-gray-600 border-gray-200"};
      return <span className={`text-xs font-semibold px-2 py-0.5 rounded-full border ${c[color]||c.gray}`}>{children}</span>;
    }
    function Card({children,className=""}) { return <div className={`bg-white rounded-2xl border border-gray-100 shadow-sm ${className}`}>{children}</div>; }
    function StatCard({icon,label,value,sub,color="blue"}) {
      const a={blue:"from-blue-500 to-blue-600",green:"from-emerald-500 to-emerald-600",amber:"from-amber-500 to-amber-600",red:"from-red-500 to-red-600",violet:"from-violet-500 to-violet-600"};
      return <Card className="p-4 flex items-start gap-3"><div className={`w-10 h-10 rounded-xl bg-gradient-to-br ${a[color]} flex items-center justify-center text-white text-lg flex-shrink-0`}>{icon}</div><div><p className="text-xs text-gray-500 font-medium">{label}</p><p className="text-lg font-bold text-gray-800 leading-tight">{value}</p>{sub&&<p className="text-xs text-gray-400 mt-0.5">{sub}</p>}</div></Card>;
    }
    function Spinner() { return <div className="flex items-center justify-center h-40"><div className="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>; }

    // ============================================================
    // MODAL: KASIR
    // ============================================================
    function KasirModal({state,reload,onClose}) {
      const [mode,setMode]=useState("cash"),[searchQ,setSearchQ]=useState(""),[sel,setSel]=useState(null),[qty,setQty]=useState(1),[result,setResult]=useState(null),[loading,setLoading]=useState(false);
      const price=state.pricePerGallon,total=qty*price;
      const fc=state.customers.filter(c=>{const m=c.name.toLowerCase().includes(searchQ.toLowerCase())||c.phone.includes(searchQ);if(mode==="subscription")return m&&c.type==="piutang";if(mode==="package")return m&&c.type==="paket";return m;});
      const ok=()=>{if(qty<1||qty>state.stock)return false;if(mode==="cash")return true;if(!sel)return false;if(mode==="package")return qty<=(sel.packageQuota-sel.usedQuota);return true;};

      const submit=async()=>{
        if(loading)return;
        setLoading(true);
        const txId=genId("T"),d=today();
        try {
          if(mode==="cash"){
            const tx={id:txId,date:d,customerId:null,customerName:"Umum",type:"cash_sale",qty,amount:total,note:`Penjualan tunai ${qty} galon`};
            await Promise.all([updateAppState({stock:state.stock-qty,cash_balance:state.cashBalance+total}),insertTx(tx)]);
            setResult({title:"✅ Penjualan Tunai Berhasil",details:[`${qty} galon × ${fmt(price)}`,`Total: ${fmt(total)}`]});
          } else if(mode==="subscription"){
            const updated={...sel,balance:sel.balance+total,gallon_taken:sel.gallon_taken+qty};
            const tx={id:txId,date:d,customerId:sel.id,customerName:sel.name,type:"subscription_takeout",qty,amount:total,note:"Ambil air - tagihan langganan"};
            await Promise.all([updateAppState({stock:state.stock-qty}),upsertCustomer(updated),insertTx(tx)]);
            setResult({title:"📋 Masuk Tagihan Langganan",details:[`${qty} galon → ${sel.name}`,`Piutang +${fmt(total)}`]});
          } else {
            const rem=sel.packageQuota-sel.usedQuota;
            const rpg=rem>0?sel.deferredRevenue/rem:0;
            const rr=qty*rpg;
            const updated={...sel,usedQuota:sel.usedQuota+qty,deferredRevenue:Math.max(0,sel.deferredRevenue-rr)};
            const tx={id:txId,date:d,customerId:sel.id,customerName:sel.name,type:"package_usage",qty,amount:rr,note:"Penggunaan kuota paket"};
            await Promise.all([updateAppState({stock:state.stock-qty}),upsertCustomer(updated),insertTx(tx)]);
            setResult({title:"🎟️ Kuota Paket Digunakan",details:[`${qty} galon dari ${sel.name}`]});
          }
          await reload();
        } catch(e) { alert("Gagal menyimpan: "+e.message); }
        setLoading(false);
      };

      if(result)return(<div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4"><Card className="p-6 w-full max-w-sm text-center"><div className="text-4xl mb-3">🎉</div><h3 className="text-lg font-bold text-gray-800 mb-2">{result.title}</h3>{result.details.map((d,i)=><p key={i} className="text-sm text-gray-600">{d}</p>)}<button onClick={onClose} className="mt-5 w-full bg-blue-600 text-white rounded-xl py-2.5 font-semibold">Selesai</button></Card></div>);
      return(
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 overflow-y-auto">
          <Card className="p-5 w-full max-w-md my-4">
            <div className="flex items-center justify-between mb-4"><h2 className="text-lg font-bold text-gray-800">🧾 Kasir</h2><button onClick={onClose} className="text-gray-400 text-xl">✕</button></div>
            <div className="grid grid-cols-3 gap-2 mb-4">
              {[{key:"cash",label:"💵 Tunai",desc:"Bayar langsung"},{key:"subscription",label:"📋 Tagihan",desc:"Piutang"},{key:"package",label:"🎟️ Paket",desc:"Kuota"}].map(m=>(
                <button key={m.key} onClick={()=>{setMode(m.key);setSel(null);setSearchQ("");}} className={`rounded-xl p-2.5 border-2 text-center transition-all ${mode===m.key?"border-blue-500 bg-blue-50":"border-gray-200"}`}>
                  <div className="text-sm font-bold text-gray-700">{m.label}</div><div className="text-xs text-gray-400">{m.desc}</div>
                </button>
              ))}
            </div>
            {mode!=="cash"&&<div className="mb-4"><label className="text-xs font-semibold text-gray-600 mb-1 block">Cari Pelanggan</label><input value={searchQ} onChange={e=>{setSearchQ(e.target.value);setSel(null);}} placeholder="Nama atau No. WhatsApp..." className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"/>{searchQ.length>0&&<div className="mt-1 border border-gray-200 rounded-xl overflow-hidden max-h-40 overflow-y-auto">{fc.length===0?<div className="px-3 py-2 text-sm text-gray-400 italic">Tidak ditemukan</div>:fc.map(c=><button key={c.id} onClick={()=>{setSel(c);setSearchQ(c.name);}} className="w-full text-left px-3 py-2 text-sm hover:bg-blue-50 flex items-center justify-between border-b last:border-0"><div><div className="font-semibold text-gray-700">{c.name}</div><div className="text-xs text-gray-400">{c.phone}</div></div>{mode==="subscription"&&<Badge color="amber">Piutang {fmt(c.balance)}</Badge>}{mode==="package"&&<Badge color="violet">Sisa {c.packageQuota-c.usedQuota} gln</Badge>}</button>)}</div>}</div>}
            {sel&&mode==="subscription"&&<div className="bg-amber-50 border border-amber-200 rounded-xl p-3 mb-4 text-sm"><div className="font-semibold text-amber-800">{sel.name}</div><div className="text-amber-700 text-xs mt-1">Piutang: <strong>{fmt(sel.balance)}</strong> | Galon: <strong>{sel.gallon_taken}</strong></div>{sel.overdue&&<div className="text-red-600 text-xs mt-1 font-semibold">⚠️ Jatuh tempo terlampaui!</div>}</div>}
            {sel&&mode==="package"&&<div className="bg-violet-50 border border-violet-200 rounded-xl p-3 mb-4 text-sm"><div className="font-semibold text-violet-800">{sel.name}</div><div className="text-violet-700 text-xs mt-1">Sisa kuota: <strong>{sel.packageQuota-sel.usedQuota} galon</strong></div></div>}
            <div className="mb-4"><label className="text-xs font-semibold text-gray-600 mb-1 block">Jumlah Galon</label><div className="flex items-center gap-3"><button onClick={()=>setQty(q=>Math.max(1,q-1))} className="w-10 h-10 rounded-xl bg-gray-100 font-bold text-gray-600 text-xl">−</button><span className="text-2xl font-bold text-gray-800 w-12 text-center">{qty}</span><button onClick={()=>setQty(q=>q+1)} className="w-10 h-10 rounded-xl bg-gray-100 font-bold text-gray-600 text-xl">+</button><span className="text-sm text-gray-400 ml-1">Stok: {state.stock}</span></div></div>
            <div className="bg-gray-50 rounded-xl p-3 mb-4"><div className="flex justify-between text-sm text-gray-600"><span>{qty} × {fmt(price)}</span><span className="font-bold text-gray-800">{fmt(total)}</span></div></div>
            <button onClick={submit} disabled={!ok()||loading} className={`w-full py-3 rounded-xl font-bold text-white ${ok()&&!loading?"bg-blue-600 hover:bg-blue-700":"bg-gray-300 cursor-not-allowed"}`}>
              {loading?"⏳ Menyimpan...":(mode==="cash"?"💵 Proses Penjualan Tunai":mode==="subscription"?"📋 Masukkan ke Tagihan":"🎟️ Gunakan Kuota Paket")}
            </button>
          </Card>
        </div>
      );
    }

    // ============================================================
    // MODAL: PELUNASAN
    // ============================================================
    function PelunasanModal({state,reload,onClose}) {
      const [sel,setSel]=useState(null),[amount,setAmount]=useState(""),[result,setResult]=useState(null),[loading,setLoading]=useState(false);
      const debtors=state.customers.filter(c=>c.type==="piutang"&&c.balance>0);
      const submit=async()=>{
        const pay=parseInt(amount);
        if(!pay||pay<=0||!sel)return;
        setLoading(true);
        try{
          const actualPay=Math.min(pay,sel.balance);
          const gp=sel.balance>0?Math.round((actualPay/sel.balance)*sel.gallon_taken):0;
          const updated={...sel,balance:sel.balance-actualPay,gallon_taken:Math.max(0,sel.gallon_taken-gp),overdue:(sel.balance-actualPay)>0?sel.overdue:false};
          const tx={id:genId("T"),date:today(),customerId:sel.id,customerName:sel.name,type:"pay_debt",qty:0,amount:actualPay,note:"Pelunasan piutang"};
          await Promise.all([updateAppState({cash_balance:state.cashBalance+actualPay}),upsertCustomer(updated),insertTx(tx)]);
          await reload();
          setResult({name:sel.name,amount:actualPay,remaining:Math.max(0,sel.balance-actualPay)});
        }catch(e){alert("Gagal: "+e.message);}
        setLoading(false);
      };
      if(result)return(<div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4"><Card className="p-6 w-full max-w-sm text-center"><div className="text-4xl mb-3">💰</div><h3 className="text-lg font-bold text-gray-800">Pelunasan Berhasil!</h3><p className="text-sm text-gray-600 mt-2">Cash In: <strong>{fmt(result.amount)}</strong></p><p className="text-sm text-gray-600">Sisa piutang {result.name}: <strong>{fmt(result.remaining)}</strong></p><button onClick={onClose} className="mt-5 w-full bg-emerald-600 text-white rounded-xl py-2.5 font-semibold">Selesai</button></Card></div>);
      return(
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
          <Card className="p-5 w-full max-w-md">
            <div className="flex items-center justify-between mb-4"><h2 className="text-lg font-bold text-gray-800">💰 Pelunasan Piutang</h2><button onClick={onClose} className="text-gray-400 text-xl">✕</button></div>
            <div className="mb-4"><label className="text-xs font-semibold text-gray-600 mb-2 block">Pilih Pelanggan</label>
              {debtors.length===0?<p className="text-sm text-gray-400 italic">Tidak ada piutang aktif.</p>:<div className="space-y-2">{debtors.map(c=><button key={c.id} onClick={()=>{setSel(c);setAmount(String(c.balance));}} className={`w-full text-left p-3 rounded-xl border-2 ${sel&&sel.id===c.id?"border-emerald-500 bg-emerald-50":"border-gray-200"}`}><div className="flex justify-between items-center"><div><div className="font-semibold text-sm text-gray-700">{c.name}</div><div className="text-xs text-gray-400">{c.phone}</div></div><div className="text-right"><div className="font-bold text-red-600">{fmt(c.balance)}</div>{c.overdue&&<Badge color="red">Jatuh Tempo</Badge>}</div></div></button>)}</div>}
            </div>
            {sel&&<div className="mb-4"><label className="text-xs font-semibold text-gray-600 mb-1 block">Jumlah Pembayaran (Rp)</label><input type="number" value={amount} onChange={e=>setAmount(e.target.value)} className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-300"/></div>}
            <button onClick={submit} disabled={!sel||!amount||loading} className={`w-full py-3 rounded-xl font-bold text-white ${sel&&amount&&!loading?"bg-emerald-600 hover:bg-emerald-700":"bg-gray-300 cursor-not-allowed"}`}>{loading?"⏳ Menyimpan...":"Konfirmasi Pelunasan"}</button>
          </Card>
        </div>
      );
    }

    // ============================================================
    // MODAL: BELI PAKET
    // ============================================================
    function BeliPaketModal({state,reload,onClose}) {
      const [name,setName]=useState(""),[phone,setPhone]=useState(""),[gallon,setGallon]=useState(10),[result,setResult]=useState(null),[loading,setLoading]=useState(false);
      const total=gallon*state.pricePerGallon;
      const submit=async()=>{
        setLoading(true);
        try{
          const ex=state.customers.find(c=>c.phone===phone&&c.type==="paket");
          const txId=genId("T"),d=today();
          if(ex){
            const updated={...ex,packageQuota:ex.packageQuota+gallon,deferredRevenue:ex.deferredRevenue+total};
            const tx={id:txId,date:d,customerId:ex.id,customerName:ex.name,type:"package_purchase",qty:gallon,amount:total,note:"Top up paket"};
            await Promise.all([updateAppState({cash_balance:state.cashBalance+total}),upsertCustomer(updated),insertTx(tx)]);
            setResult({name:ex.name,gallon,total,type:"topup"});
          }else{
            const nc={id:genId("C"),name,phone,type:"paket",balance:0,gallon_taken:0,dueDate:null,overdue:false,gallonDeposit:0,packageQuota:gallon,usedQuota:0,packagePaid:total,deferredRevenue:total};
            const tx={id:txId,date:d,customerId:nc.id,customerName:nc.name,type:"package_purchase",qty:gallon,amount:total,note:"Pembelian paket baru"};
            await Promise.all([updateAppState({cash_balance:state.cashBalance+total}),upsertCustomer(nc),insertTx(tx)]);
            setResult({name,gallon,total,type:"new"});
          }
          await reload();
        }catch(e){alert("Gagal: "+e.message);}
        setLoading(false);
      };
      if(result)return(<div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4"><Card className="p-6 w-full max-w-sm text-center"><div className="text-4xl mb-3">🎟️</div><h3 className="text-lg font-bold text-gray-800">{result.type==="new"?"Paket Baru Dibuat!":"Paket Di-Top Up!"}</h3><p className="text-sm text-gray-600 mt-2">{result.name} · {result.gallon} galon</p><p className="text-sm text-gray-600">Cash In: <strong>{fmt(result.total)}</strong></p><button onClick={onClose} className="mt-5 w-full bg-violet-600 text-white rounded-xl py-2.5 font-semibold">Selesai</button></Card></div>);
      return(
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
          <Card className="p-5 w-full max-w-md">
            <div className="flex items-center justify-between mb-4"><h2 className="text-lg font-bold text-gray-800">🎟️ Beli / Top Up Paket</h2><button onClick={onClose} className="text-gray-400 text-xl">✕</button></div>
            <div className="space-y-3 mb-4">
              <div><label className="text-xs font-semibold text-gray-600 mb-1 block">No. WhatsApp</label><input value={phone} onChange={e=>setPhone(e.target.value)} placeholder="08xxxxxxxxxx" type="tel" className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-violet-300"/></div>
              <div><label className="text-xs font-semibold text-gray-600 mb-1 block">Nama Pelanggan</label><input value={name} onChange={e=>setName(e.target.value)} placeholder="Nama lengkap" className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-violet-300"/></div>
              <div><label className="text-xs font-semibold text-gray-600 mb-1 block">Jumlah Galon</label><div className="flex gap-3">{[5,10,20].map(n=><button key={n} onClick={()=>setGallon(n)} className={`flex-1 py-3 rounded-xl border-2 font-semibold text-sm ${gallon===n?"border-violet-500 bg-violet-50 text-violet-700":"border-gray-200 text-gray-600"}`}>{n} gln</button>)}</div></div>
            </div>
            <div className="bg-violet-50 rounded-xl p-3 mb-4"><div className="flex justify-between text-sm"><span className="text-gray-600">Total Bayar</span><span className="font-bold text-violet-700">{fmt(total)}</span></div></div>
            <button onClick={submit} disabled={!name||!phone||loading} className={`w-full py-3 rounded-xl font-bold text-white ${name&&phone&&!loading?"bg-violet-600 hover:bg-violet-700":"bg-gray-300 cursor-not-allowed"}`}>{loading?"⏳ Menyimpan...":"Konfirmasi Pembelian Paket"}</button>
          </Card>
        </div>
      );
    }

    // ============================================================
    // PAGE: DASHBOARD
    // ============================================================
    function Dashboard({state}) {
      const tp=state.customers.filter(c=>c.type==="piutang").reduce((s,c)=>s+c.balance,0);
      const tk=state.customers.filter(c=>c.type==="paket").reduce((s,c)=>s+c.deferredRevenue,0);
      const tg=state.customers.reduce((s,c)=>s+(c.gallonDeposit||0),0);
      const oc=state.customers.filter(c=>c.overdue).length;
      return(
        <div className="space-y-5">
          <div><h2 className="text-xl font-bold text-gray-800">Dashboard</h2><p className="text-sm text-gray-400">Ringkasan keuangan & operasional</p></div>
          {oc>0&&<div className="bg-red-50 border border-red-200 rounded-2xl p-4 flex items-start gap-3"><span className="text-2xl">🚨</span><div><p className="font-bold text-red-700">{oc} Pelanggan Jatuh Tempo!</p><p className="text-sm text-red-600">Segera tagih melalui halaman Tagihan.</p></div></div>}
          <div className="grid grid-cols-2 gap-3">
            <StatCard icon="💵" label="Saldo Kas" value={fmt(state.cashBalance)} color="green"/>
            <StatCard icon="🪣" label="Stok Air" value={`${state.stock} galon`} sub={state.stock<10?"⚠️ Hampir habis!":"Aman"} color={state.stock<10?"red":"blue"}/>
            <StatCard icon="📋" label="Total Piutang" value={fmt(tp)} sub="Belum dibayar" color="amber"/>
            <StatCard icon="🎟️" label="Kewajiban Paket" value={fmt(tk)} sub="Kuota belum diambil" color="violet"/>
          </div>
          <Card className="p-4">
            <h3 className="font-bold text-gray-700 mb-3 text-sm">⚖️ Neraca Singkat</h3>
            <div className="grid grid-cols-2 gap-4">
              <div><p className="font-semibold text-gray-400 text-xs uppercase mb-2">ASET</p><div className="space-y-1.5">{[["Kas",fmt(state.cashBalance)],["Piutang Usaha",fmt(tp)],[`Stok (${state.stock} gln)`,fmt(state.stock*state.pricePerGallon)],["Galon di Pelanggan",`${tg} unit`]].map(([k,v])=><div key={k} className="flex justify-between text-xs"><span className="text-gray-500">{k}</span><span className="font-semibold text-gray-800">{v}</span></div>)}</div></div>
              <div><p className="font-semibold text-gray-400 text-xs uppercase mb-2">KEWAJIBAN</p><div className="flex justify-between text-xs"><span className="text-gray-500">Pend. Ditangguhkan</span><span className="font-semibold text-gray-800">{fmt(tk)}</span></div></div>
            </div>
          </Card>
          <Card className="p-4">
            <h3 className="font-bold text-gray-700 mb-3 text-sm">🕐 Transaksi Terkini</h3>
            <div>{[...state.transactions].reverse().slice(0,6).map(t=><div key={t.id} className="flex items-center justify-between py-2 border-b border-gray-50 last:border-0"><div><div className="font-medium text-gray-700 text-sm">{t.customerName}</div><div className="text-xs text-gray-400">{t.note} · {fmtDate(t.date)}</div></div><div className="text-right ml-2 flex-shrink-0"><div className="font-bold text-gray-800 text-sm">{fmt(t.amount)}</div><Badge color={t.type==="cash_sale"?"green":t.type==="subscription_takeout"?"amber":t.type==="pay_debt"?"green":"violet"}>{t.type==="cash_sale"?"Tunai":t.type==="subscription_takeout"?"Piutang":t.type==="pay_debt"?"Bayar":t.type==="package_purchase"?"Paket":"Kuota"}</Badge></div></div>)}</div>
          </Card>
        </div>
      );
    }

    // ============================================================
    // FORM: TAMBAH PELANGGAN
    // ============================================================
    function TambahPelangganForm({state,reload,onDone}) {
      const [name,setName]=useState(""),[phone,setPhone]=useState(""),[type,setType]=useState("piutang"),[dueDate,setDueDate]=useState("25"),[gallon,setGallon]=useState(10),[saved,setSaved]=useState(false),[sn,setSn]=useState(""),[loading,setLoading]=useState(false);
      const save=async()=>{
        if(!name.trim()||!phone.trim())return;
        setLoading(true);
        try{
          const id=genId("C"),now=new Date(),due=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${dueDate.padStart(2,"0")}`;
          if(type==="piutang"){
            await upsertCustomer({id,name:name.trim(),phone:phone.trim(),type:"piutang",balance:0,gallon_taken:0,dueDate:due,overdue:false,gallonDeposit:0,packageQuota:0,usedQuota:0,packagePaid:0,deferredRevenue:0});
          }else{
            const amt=gallon*state.pricePerGallon;
            const nc={id,name:name.trim(),phone:phone.trim(),type:"paket",balance:0,gallon_taken:0,dueDate:null,overdue:false,gallonDeposit:0,packageQuota:gallon,usedQuota:0,packagePaid:amt,deferredRevenue:amt};
            const tx={id:genId("T"),date:today(),customerId:id,customerName:name.trim(),type:"package_purchase",qty:gallon,amount:amt,note:"Pembelian paket baru"};
            await Promise.all([updateAppState({cash_balance:state.cashBalance+amt}),upsertCustomer(nc),insertTx(tx)]);
          }
          await reload();
          setSn(name.trim());setSaved(true);
        }catch(e){alert("Gagal: "+e.message);}
        setLoading(false);
      };
      if(saved)return(<Card className="p-6 text-center"><div className="text-5xl mb-3">✅</div><p className="text-xl font-bold text-gray-800">{sn} berhasil ditambahkan!</p><div className="flex gap-3 mt-5"><button onClick={()=>{setName("");setPhone("");setType("piutang");setSaved(false);}} className="flex-1 py-4 rounded-2xl border-2 border-blue-500 text-blue-600 font-bold text-base">+ Tambah Lagi</button><button onClick={onDone} className="flex-1 py-4 rounded-2xl bg-blue-600 text-white font-bold text-base">Selesai</button></div></Card>);
      return(
        <Card className="p-5">
          <h3 className="text-lg font-bold text-gray-800 mb-5">➕ Tambah Pelanggan Baru</h3>
          <div className="mb-5"><label className="block text-base font-bold text-gray-700 mb-2">👤 Nama Pelanggan</label><input value={name} onChange={e=>setName(e.target.value)} placeholder="Contoh: Pak Budi" className="w-full border-2 border-gray-200 rounded-2xl px-4 py-3 text-lg focus:outline-none focus:border-blue-400"/></div>
          <div className="mb-5"><label className="block text-base font-bold text-gray-700 mb-2">📱 Nomor WhatsApp</label><input value={phone} onChange={e=>setPhone(e.target.value)} placeholder="Contoh: 08123456789" type="tel" className="w-full border-2 border-gray-200 rounded-2xl px-4 py-3 text-lg focus:outline-none focus:border-blue-400"/></div>
          <div className="mb-5"><label className="block text-base font-bold text-gray-700 mb-3">🗂️ Jenis Langganan</label><div className="grid grid-cols-2 gap-3"><button onClick={()=>setType("piutang")} className={`py-4 rounded-2xl border-2 font-bold text-base ${type==="piutang"?"border-amber-500 bg-amber-50 text-amber-700":"border-gray-200 text-gray-500"}`}>📋 Tagihan<br/><span className="text-xs font-normal">Bayar akhir bulan</span></button><button onClick={()=>setType("paket")} className={`py-4 rounded-2xl border-2 font-bold text-base ${type==="paket"?"border-violet-500 bg-violet-50 text-violet-700":"border-gray-200 text-gray-500"}`}>🎟️ Paket<br/><span className="text-xs font-normal">Bayar di awal</span></button></div></div>
          {type==="piutang"&&<div className="mb-5"><label className="block text-base font-bold text-gray-700 mb-3">📅 Jatuh Tempo Tiap Bulan</label><div className="flex gap-2 flex-wrap">{["10","15","20","25","30"].map(d=><button key={d} onClick={()=>setDueDate(d)} className={`px-5 py-3 rounded-2xl border-2 font-bold text-base ${dueDate===d?"border-blue-500 bg-blue-50 text-blue-700":"border-gray-200 text-gray-500"}`}>Tgl {d}</button>)}</div></div>}
          {type==="paket"&&<div className="mb-5"><label className="block text-base font-bold text-gray-700 mb-3">🪣 Jumlah Galon Paket</label><div className="flex gap-3">{[5,10,20].map(n=><button key={n} onClick={()=>setGallon(n)} className={`flex-1 py-4 rounded-2xl border-2 font-bold text-xl ${gallon===n?"border-violet-500 bg-violet-50 text-violet-700":"border-gray-200 text-gray-500"}`}>{n}<br/><span className="text-xs font-normal">galon</span></button>)}</div><p className="text-sm text-gray-400 mt-2 text-center">Bayar sekarang: <strong>{fmt(gallon*state.pricePerGallon)}</strong></p></div>}
          <button onClick={save} disabled={!name.trim()||!phone.trim()||loading} className={`w-full py-4 rounded-2xl font-bold text-xl ${name.trim()&&phone.trim()&&!loading?"bg-blue-600 text-white":"bg-gray-200 text-gray-400 cursor-not-allowed"}`}>{loading?"⏳ Menyimpan...":"💾 Simpan Pelanggan"}</button>
        </Card>
      );
    }

    // ============================================================
    // PAGE: PELANGGAN
    // ============================================================
    function PelangganPage({state,reload}) {
      const [tab,setTab]=useState("daftar"),[lt,setLt]=useState("piutang");
      const filtered=state.customers.filter(c=>c.type===lt);
      return(
        <div className="space-y-4">
          <div><h2 className="text-xl font-bold text-gray-800">Pelanggan</h2><p className="text-sm text-gray-400">Daftar & tambah pelanggan langganan</p></div>
          <div className="flex gap-2">
            <button onClick={()=>setTab("tambah")} className={`flex-1 py-3 rounded-2xl border-2 font-bold text-base ${tab==="tambah"?"border-blue-500 bg-blue-50 text-blue-700":"border-gray-200 text-gray-500"}`}>➕ Tambah Pelanggan</button>
            <button onClick={()=>setTab("daftar")} className={`flex-1 py-3 rounded-2xl border-2 font-bold text-base ${tab==="daftar"?"border-gray-700 bg-gray-50 text-gray-700":"border-gray-200 text-gray-500"}`}>📋 Daftar</button>
          </div>
          {tab==="tambah"&&<TambahPelangganForm state={state} reload={reload} onDone={()=>setTab("daftar")}/>}
          {tab==="daftar"&&<>
            <div className="flex gap-2">
              <button onClick={()=>setLt("piutang")} className={`px-4 py-2 rounded-xl text-sm font-semibold border-2 ${lt==="piutang"?"border-amber-500 bg-amber-50 text-amber-700":"border-gray-200 text-gray-600"}`}>📋 Tagihan ({state.customers.filter(c=>c.type==="piutang").length})</button>
              <button onClick={()=>setLt("paket")} className={`px-4 py-2 rounded-xl text-sm font-semibold border-2 ${lt==="paket"?"border-violet-500 bg-violet-50 text-violet-700":"border-gray-200 text-gray-600"}`}>🎟️ Paket ({state.customers.filter(c=>c.type==="paket").length})</button>
            </div>
            {filtered.length===0?<Card className="p-8 text-center"><div className="text-4xl mb-2">👤</div><p className="text-gray-500">Belum ada pelanggan.<br/>Tekan "Tambah Pelanggan" di atas.</p></Card>:
            <div className="space-y-3">{filtered.map(c=><Card key={c.id} className="p-4">
              <div className="flex items-start justify-between mb-2"><div><div className="font-bold text-gray-800 text-base">{c.name}</div><div className="text-sm text-gray-400">📱 {c.phone}</div></div>{c.overdue&&<Badge color="red">Jatuh Tempo</Badge>}</div>
              {c.type==="piutang"&&<><div className="bg-amber-50 rounded-xl p-3 mb-2"><div className="flex justify-between text-sm mb-1"><span className="text-gray-600">Piutang Outstanding</span><span className="font-bold text-amber-700">{fmt(c.balance)}</span></div><div className="text-xs text-gray-400">Galon diambil: {c.gallon_taken} galon</div></div><div className="text-xs text-gray-400">Jatuh Tempo: {c.dueDate?fmtDate(c.dueDate):"-"} · Galon pinjaman: {c.gallonDeposit} unit</div></>}
              {c.type==="paket"&&<div className="bg-violet-50 rounded-xl p-3"><div className="flex justify-between text-sm mb-1"><span className="text-gray-600">Sisa Kuota</span><span className="font-bold text-violet-700">{c.packageQuota-c.usedQuota}/{c.packageQuota} galon</span></div><div className="w-full bg-violet-200 rounded-full h-1.5"><div className="bg-violet-500 h-1.5 rounded-full" style={{width:`${c.packageQuota>0?((c.packageQuota-c.usedQuota)/c.packageQuota)*100:0}%`}}/></div><div className="text-xs text-gray-400 mt-1">Kewajiban: {fmt(c.deferredRevenue)} · Galon pinjaman: {c.gallonDeposit} unit</div>{(c.packageQuota-c.usedQuota)<=2&&<div className="text-amber-600 text-xs font-semibold mt-1">⚠️ Kuota hampir habis!</div>}</div>}
            </Card>)}</div>}
          </>}
        </div>
      );
    }

    // ============================================================
    // PAGE: TAGIHAN
    // ============================================================
    function TagihanPage({state}) {
      const ov=state.customers.filter(c=>c.type==="piutang"&&c.balance>0);
      return(
        <div className="space-y-4">
          <div><h2 className="text-xl font-bold text-gray-800">Daftar Tagihan</h2><p className="text-sm text-gray-400">Reminder piutang pelanggan</p></div>
          {ov.length===0?<Card className="p-8 text-center"><div className="text-4xl mb-2">🎉</div><p className="font-semibold text-gray-700">Semua piutang sudah lunas!</p></Card>:
          <div className="space-y-3">{ov.map(c=><Card key={c.id} className={`p-4 ${c.overdue?"border-red-200 bg-red-50":""}`}>
            <div className="flex items-start justify-between mb-2"><div><div className="font-bold text-gray-800">{c.name}</div><div className="text-xs text-gray-400">📱 {c.phone}</div></div>{c.overdue?<Badge color="red">🔴 Jatuh Tempo</Badge>:<Badge color="amber">🟡 Berjalan</Badge>}</div>
            <div className="flex justify-between items-center">
              <div className="text-sm text-gray-600"><div>Tagihan: <strong className="text-red-600">{fmt(c.balance)}</strong></div><div className="text-xs text-gray-400">Jatuh Tempo: {c.dueDate?fmtDate(c.dueDate):"-"}</div></div>
              <a href={`https://wa.me/${c.phone.replace(/^0/,"62")}?text=Halo%20${encodeURIComponent(c.name)}%2C%20tagihan%20air%20Anda%20sebesar%20${encodeURIComponent(fmt(c.balance))}%20sudah%20jatuh%20tempo.%20Mohon%20segera%20dilunasi.%20Terima%20kasih.`} target="_blank" rel="noopener noreferrer" className="flex items-center gap-1.5 bg-green-500 text-white text-xs font-semibold px-3 py-2 rounded-xl">📲 WhatsApp</a>
            </div>
          </Card>)}</div>}
        </div>
      );
    }

    // ============================================================
    // PAGE: LAPORAN
    // ============================================================
    function LaporanPage({state}) {
      const cs=state.transactions.filter(t=>t.type==="cash_sale"),pu=state.transactions.filter(t=>t.type==="package_usage"),dp=state.transactions.filter(t=>t.type==="pay_debt"),pp=state.transactions.filter(t=>t.type==="package_purchase"),st=state.transactions.filter(t=>t.type==="subscription_takeout");
      const sum=a=>a.reduce((s,t)=>s+t.amount,0);
      const tr=sum(cs)+sum(pu)+sum(st),tc=sum(cs)+sum(dp)+sum(pp);
      const tp=state.customers.filter(c=>c.type==="piutang").reduce((s,c)=>s+c.balance,0);
      const tk=state.customers.filter(c=>c.type==="paket").reduce((s,c)=>s+c.deferredRevenue,0);
      const tg=state.customers.reduce((s,c)=>s+(c.gallonDeposit||0),0);
      return(
        <div className="space-y-5">
          <div><h2 className="text-xl font-bold text-gray-800">Laporan Keuangan</h2><p className="text-sm text-gray-400">Laba Rugi + Neraca terpadu</p></div>
          <Card className="p-4"><h3 className="font-bold text-gray-700 mb-3 text-sm">📊 Laba Rugi <span className="text-xs text-gray-400 font-normal">(Accrual)</span></h3><div className="space-y-2 text-sm"><div className="flex justify-between"><span className="text-gray-600">Penjualan Tunai</span><span className="font-semibold">{fmt(sum(cs))}</span></div><div className="flex justify-between"><span className="text-gray-600">Langganan Piutang (diakui)</span><span className="font-semibold">{fmt(sum(st))}</span></div><div className="flex justify-between"><span className="text-gray-600">Penggunaan Kuota Paket</span><span className="font-semibold">{fmt(sum(pu))}</span></div><div className="border-t pt-2 flex justify-between font-bold text-gray-800"><span>Total Pendapatan</span><span className="text-emerald-600">{fmt(tr)}</span></div></div></Card>
          <Card className="p-4"><h3 className="font-bold text-gray-700 mb-3 text-sm">💵 Arus Kas</h3><div className="space-y-2 text-sm"><div className="flex justify-between"><span className="text-gray-600">Dari Penjualan Tunai</span><span className="font-semibold text-emerald-600">+{fmt(sum(cs))}</span></div><div className="flex justify-between"><span className="text-gray-600">Dari Pelunasan Piutang</span><span className="font-semibold text-emerald-600">+{fmt(sum(dp))}</span></div><div className="flex justify-between"><span className="text-gray-600">Dari Pembelian Paket</span><span className="font-semibold text-emerald-600">+{fmt(sum(pp))}</span></div><div className="border-t pt-2 flex justify-between font-bold text-gray-800"><span>Total Cash In</span><span className="text-emerald-600">{fmt(tc)}</span></div></div></Card>
          <Card className="p-4"><h3 className="font-bold text-gray-700 mb-3 text-sm">⚖️ Neraca</h3><div className="grid grid-cols-2 gap-4"><div><p className="font-semibold text-gray-400 text-xs uppercase mb-2">ASET</p><div className="space-y-1.5">{[["Kas",fmt(state.cashBalance)],["Piutang Usaha",fmt(tp)],[`Stok (${state.stock} gln)`,fmt(state.stock*state.pricePerGallon)],["Galon Pinjaman",`${tg} unit`]].map(([k,v])=><div key={k} className="flex justify-between text-xs"><span className="text-gray-600">{k}</span><span className="font-semibold text-gray-800">{v}</span></div>)}</div></div><div><p className="font-semibold text-gray-400 text-xs uppercase mb-2">KEWAJIBAN</p><div className="flex justify-between text-xs"><span className="text-gray-600">Pend. Ditangguhkan</span><span className="font-semibold text-gray-800">{fmt(tk)}</span></div></div></div></Card>
        </div>
      );
    }

    // ============================================================
    // APP ROOT
    // ============================================================
    function App() {
      const [state,setState]=useState(null);
      const [page,setPage]=useState("dashboard");
      const [modal,setModal]=useState(null);
      const [error,setError]=useState(null);

      const reload=useCallback(async()=>{
        try{ const data=await loadAll(); setState(data); }
        catch(e){ setError(e.message); }
      },[]);

      useEffect(()=>{ reload(); },[]);

      const nav=[{key:"dashboard",icon:"🏠",label:"Beranda"},{key:"pelanggan",icon:"👥",label:"Pelanggan"},{key:"tagihan",icon:"🔔",label:"Tagihan"},{key:"laporan",icon:"📊",label:"Laporan"}];

      if(error)return(<div className="min-h-screen flex items-center justify-center p-8"><div className="text-center"><div className="text-4xl mb-3">❌</div><p className="font-bold text-red-700">Gagal terhubung ke database</p><p className="text-sm text-gray-500 mt-1">{error}</p><button onClick={reload} className="mt-4 bg-blue-600 text-white px-6 py-2 rounded-xl font-semibold">Coba Lagi</button></div></div>);
      if(!state)return(<div className="min-h-screen flex items-center justify-center"><div className="text-center"><div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-3"></div><p className="text-gray-500 text-sm">Memuat data...</p></div></div>);

      const oc=state.customers.filter(c=>c.overdue).length;
      return(
        <div className="min-h-screen bg-gray-50 flex flex-col max-w-lg mx-auto">
          <div className="bg-white border-b border-gray-100 px-4 py-3 flex items-center justify-between sticky top-0 z-10">
            <div className="flex items-center gap-2">
              <div className="w-8 h-8 bg-gradient-to-br from-blue-500 to-cyan-500 rounded-xl flex items-center justify-center text-white font-bold">💧</div>
              <div><div className="font-bold text-gray-800 text-sm leading-tight">AirKu POS</div><div className="text-xs text-gray-400">Depo Air Minum</div></div>
            </div>
            <div className="flex gap-2">
              <button onClick={reload} className="text-xs bg-gray-100 text-gray-600 font-semibold px-2 py-1.5 rounded-xl">🔄</button>
              <button onClick={()=>setModal("paket")} className="text-xs bg-violet-100 text-violet-700 font-semibold px-3 py-1.5 rounded-xl">🎟️ Paket</button>
              <button onClick={()=>setModal("kasir")} className="text-xs bg-blue-600 text-white font-semibold px-3 py-1.5 rounded-xl">🧾 Kasir</button>
            </div>
          </div>
          <div className="flex-1 overflow-y-auto p-4 pb-24">
            {page==="dashboard"&&<Dashboard state={state}/>}
            {page==="pelanggan"&&<PelangganPage state={state} reload={reload}/>}
            {page==="tagihan"&&<TagihanPage state={state}/>}
            {page==="laporan"&&<LaporanPage state={state}/>}
          </div>
          {page==="tagihan"&&<div className="fixed bottom-20 left-1/2 -translate-x-1/2 w-full max-w-lg px-4 z-10"><button onClick={()=>setModal("pelunasan")} className="w-full bg-emerald-600 text-white font-bold py-3 rounded-2xl shadow-lg">💰 Terima Pelunasan Piutang</button></div>}
          <div className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-lg bg-white border-t border-gray-100 flex z-10">
            {nav.map(n=><button key={n.key} onClick={()=>setPage(n.key)} className={`flex-1 py-3 flex flex-col items-center gap-0.5 relative ${page===n.key?"text-blue-600":"text-gray-400"}`}><span className="text-lg">{n.icon}</span><span className="text-xs font-medium">{n.label}</span>{n.key==="tagihan"&&oc>0&&<span className="absolute top-1.5 right-3 w-4 h-4 bg-red-500 text-white text-xs font-bold rounded-full flex items-center justify-center">{oc}</span>}</button>)}
          </div>
          {modal==="kasir"&&<KasirModal state={state} reload={reload} onClose={()=>setModal(null)}/>}
          {modal==="pelunasan"&&<PelunasanModal state={state} reload={reload} onClose={()=>setModal(null)}/>}
          {modal==="paket"&&<BeliPaketModal state={state} reload={reload} onClose={()=>setModal(null)}/>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
